name: ACS Sandbox

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'acs-orchestrator/**'
      - 'server/src/agent/**'
      - 'server/src/runtime/handProtocol.ts'
      - 'server/src/runtime/httpTransport.ts'
      - 'server/src/runtime/rawAgentLoop.ts'
      - 'server/src/runtime/rawRuntimeRunDispatch.ts'
      - 'server/src/runtime/handStore.ts'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/acs-sandbox.yml'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  ACR_REGISTRY: agentsaasacrprod-registry-vpc.cn-shenzhen.cr.aliyuncs.com
  ACR_REPOSITORY: agent-saas/acs-sandbox
  ACR_INSTANCE_ID: cri-tapxtcyd6odwj3m4
  ACR_REGION_ID: cn-shenzhen
  ECS_DEPLOY_ROOT: /opt/agent-saas
  ACS_SERVICE_NAME: agent-saas-acs-orchestrator.service

jobs:
  build:
    name: Build ACS Sandbox Image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck orchestrator and server
        run: |
          pnpm -F acs-orchestrator typecheck
          pnpm -F server typecheck

      - name: Test orchestrator
        run: pnpm -F acs-orchestrator test

      - name: Prepare image metadata
        id: meta
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tag="$(date -u +%Y%m%d)-${short_sha}-amd64"
          image="${ACR_REGISTRY}/${ACR_REPOSITORY}:${tag}"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "LOCAL_IMAGE=agent-saas-acs-sandbox:${tag}" >> "$GITHUB_ENV"

      - name: Build image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target acs-sandbox \
            --load \
            -t "$LOCAL_IMAGE" \
            .

      - name: Local image command matrix
        run: |
          docker run --rm --user 501:20 --entrypoint /bin/sh "$LOCAL_IMAGE" -c '
          set -eu
          for c in node npm npx pnpm corepack yarn bash git git-lfs ssh scp curl wget rg jq zip unzip python python3 pip gcc g++ make cmake pkg-config sqlite3 psql mysql dig nslookup nc ping tree openssl ffmpeg ffprobe convert identify soffice pandoc pdftotext qpdf gs tesseract fc-match; do
            command -v "$c" >/dev/null || { echo "missing $c"; exit 1; }
          done
          python3 - <<PY
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          PY
          test "$(id -u)" = "501"
          test "$(find --version | head -1 | grep -c "GNU findutils")" = "1"
          test "$TZ" = "Asia/Shanghai"
          test "$(date +%z)" = "+0800"
          test "$(cat /etc/timezone)" = "Asia/Shanghai"
          test "$(readlink -f /etc/localtime)" = "/usr/share/zoneinfo/Asia/Shanghai"
          test "$LANG" = "C.UTF-8"
          test "$LC_ALL" = "C.UTF-8"
          test "$PLAYWRIGHT_BROWSERS_PATH" = "/ms-playwright"
          test "$MPLBACKEND" = "Agg"
          test "$NPM_CONFIG_PREFIX" = "/home/agent/.npm-global"
          test "$(npm config get prefix)" = "/home/agent/.npm-global"
          npm list -g --depth=0 >/dev/null
          test "$DOWNLOAD_DIR" = "/workspace/downloads"
          test "$XDG_DOWNLOAD_DIR" = "/workspace/downloads"
          test "$ACS_PYTHON_WHEELHOUSE" = "/opt/ky-agent/python-wheels"
          test -d "$ACS_PYTHON_WHEELHOUSE"
          test "$(find "$ACS_PYTHON_WHEELHOUSE" -name "*.whl" | wc -l)" -gt 0
          fc-match "Noto Sans CJK SC" | grep -Ei "Noto|CJK|Sans" >/dev/null
          case ":$PATH:" in *":/home/agent/.npm-global/bin:"*) ;; *) echo "missing npm global bin in PATH"; exit 1 ;; esac
          touch "$NPM_CONFIG_PREFIX/.write-test" && rm "$NPM_CONFIG_PREFIX/.write-test"
          mkdir -p "$DOWNLOAD_DIR" && touch "$DOWNLOAD_DIR/.write-test" && rm "$DOWNLOAD_DIR/.write-test"
          '

      - name: Local runner contract smoke
        run: |
          node <<'NODE' \
            | docker run --rm --user 501:20 \
                -e ACS_SANDBOX_IMAGE="$IMAGE" \
                -i "$LOCAL_IMAGE" \
                /app/acs-orchestrator/node_modules/.bin/tsx /app/acs-orchestrator/src/sandboxRunner.ts
          const command = [
            'set -eu',
            'test "$(id -u)" = 501',
            'test "$(pwd)" = /workspace',
            'test "$(which python3)" = /workspace/.ky-agent/runtime/venv/bin/python3',
            'test "$VIRTUAL_ENV" = /workspace/.ky-agent/runtime/venv',
            'test "$PIP_CACHE_DIR" = /workspace/.ky-agent/runtime/cache/pip',
            'test "$PIP_REQUIRE_VIRTUALENV" = 1',
            'test "$TZ" = Asia/Shanghai',
            'test "$(date +%z)" = +0800',
            'test "$(cat /etc/timezone)" = Asia/Shanghai',
            'test "$(readlink -f /etc/localtime)" = /usr/share/zoneinfo/Asia/Shanghai',
            'test "$PLAYWRIGHT_BROWSERS_PATH" = /ms-playwright',
            'test "$MPLBACKEND" = Agg',
            'test "$(npm config get prefix)" = /home/agent/.npm-global',
            'npm list -g --depth=0 >/dev/null',
            'test "$DOWNLOAD_DIR" = /workspace/downloads',
            'test "$ACS_PYTHON_WHEELHOUSE" = /opt/ky-agent/python-wheels',
            'test -f /workspace/.ky-agent/runtime/venv/.ky-runtime.json',
            'for c in openssl ffmpeg ffprobe convert identify soffice pandoc pdftotext qpdf gs tesseract fc-match; do command -v "$c" >/dev/null; done',
            'fc-match "Noto Sans CJK SC" | grep -Ei "Noto|CJK|Sans" >/dev/null',
            'python3 - <<\\PY',
            'import requests, httpx, aiohttp, bs4, lxml, numpy, pandas, pyarrow, openpyxl, docx, pptx, PIL, jinja2, markdown, pypdf, pdfplumber, fitz, reportlab, matplotlib, sqlalchemy, pymysql, psycopg, redis, dotenv, yaml, jieba, sklearn, playwright',
            'print("PYTHON_BASE_IMPORTS_OK")',
            'PY',
            'node - <<\\NODE',
            'const { chromium } = require("/app/server/node_modules/playwright");',
            '(async () => {',
            '  const browser = await chromium.launch({ headless: true, args: ["--disable-dev-shm-usage"] });',
            '  const page = await browser.newPage();',
            '  await page.setContent("<html><body><h1>中文测试</h1></body></html>");',
            '  await page.screenshot({ path: "/tmp/playwright-smoke.png" });',
            '  await browser.close();',
            '  console.log("PLAYWRIGHT_CHROMIUM_OK");',
            '})().catch((err) => { console.error(err); process.exit(1); });',
            'NODE',
            'echo LOCAL_ACS_SANDBOX_SMOKE_OK',
          ].join('\n');
          process.stdout.write(JSON.stringify({
            toolName: 'Shell',
            input: { command, timeoutMs: 120000 },
            workspace: { id: 'ws-local', sessionId: 's-local', root: '/workspace' },
          }));
          NODE

      - name: Save image and release bundle
        run: |
          set -euo pipefail
          docker save "$LOCAL_IMAGE" | gzip -1 > "$RUNNER_TEMP/acs-sandbox-image.tar.gz"
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./*/node_modules' \
            --exclude='./server/data' \
            --exclude='./logs' \
            --exclude='./config.json' \
            --exclude='./config.json.*' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./mobile/ios' \
            --exclude='./mobile/android' \
            -czf "$RUNNER_TEMP/agent-saas-acs-release.tgz" .

      - name: Upload ACS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: acs-sandbox-release
          path: |
            ${{ runner.temp }}/acs-sandbox-image.tar.gz
            ${{ runner.temp }}/agent-saas-acs-release.tgz
          retention-days: 5

  deploy:
    name: Push Image and Deploy ACS Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      IMAGE: ${{ needs.build.outputs.image }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Download ACS artifacts
        uses: actions/download-artifact@v8
        with:
          name: acs-sandbox-release

      - name: Configure SSH
        run: |
          : "${ECS_HOST:?Missing secret ECS_HOST}"
          : "${ECS_USER:?Missing secret ECS_USER}"
          : "${ECS_SSH_KEY:?Missing secret ECS_SSH_KEY}"
          : "${ACR_USERNAME:?Missing secret ACR_USERNAME}"
          : "${ACR_PASSWORD:?Missing secret ACR_PASSWORD}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Upload image and release
        run: |
          scp -i ~/.ssh/ecs_deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            acs-sandbox-image.tar.gz agent-saas-acs-release.tgz \
            "$ECS_USER@$ECS_HOST:/tmp/"

      - name: Push to ACR, deploy orchestrator, run smoke
        run: |
          ssh -i ~/.ssh/ecs_deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$ECS_USER@$ECS_HOST" \
            "ACR_REGISTRY='$ACR_REGISTRY' ACR_INSTANCE_ID='$ACR_INSTANCE_ID' ACR_REGION_ID='$ACR_REGION_ID' ACR_USERNAME='$ACR_USERNAME' ACR_PASSWORD='$ACR_PASSWORD' IMAGE='$IMAGE' IMAGE_TAG='$IMAGE_TAG' ECS_DEPLOY_ROOT='$ECS_DEPLOY_ROOT' ACS_SERVICE_NAME='$ACS_SERVICE_NAME' GITHUB_RUN_ID='$GITHUB_RUN_ID' GITHUB_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          : "${ACR_REGISTRY:?missing ACR_REGISTRY}"
          : "${ACR_INSTANCE_ID:?missing ACR_INSTANCE_ID}"
          : "${ACR_REGION_ID:?missing ACR_REGION_ID}"
          : "${IMAGE:?missing IMAGE}"
          : "${IMAGE_TAG:?missing IMAGE_TAG}"
          : "${ECS_DEPLOY_ROOT:?missing ECS_DEPLOY_ROOT}"
          : "${ACS_SERVICE_NAME:?missing ACS_SERVICE_NAME}"

          APP_DIR="$ECS_DEPLOY_ROOT"
          ENV_FILE="/etc/agent-saas/acs-orchestrator.env"
          IMAGE_TAR="/tmp/acs-sandbox-image.tar.gz"
          RELEASE_TGZ="/tmp/agent-saas-acs-release.tgz"
          LOCAL_IMAGE="agent-saas-acs-sandbox:${IMAGE_TAG}"
          SMOKE_SESSION=""

          cleanup() {
            if [ -n "${SMOKE_SESSION:-}" ] && command -v kubectl >/dev/null 2>&1; then
              if [ -n "${ACS_KUBECONFIG:-}" ]; then
                KCFG_ARGS="--kubeconfig ${ACS_KUBECONFIG}"
              else
                KCFG_ARGS=""
              fi
              # shellcheck disable=SC2086
              kubectl $KCFG_ARGS -n "${ACS_NAMESPACE:-agent-saas-coding}" delete sandbox \
                -l "agent-saas.kaiyan.net/session-id=${SMOKE_SESSION}" --ignore-not-found=true >/dev/null 2>&1 || true
            fi
            rm -f "$IMAGE_TAR" "$RELEASE_TGZ"
          }
          trap cleanup EXIT

          mkdir -p "$APP_DIR"
          tar -xzf "$RELEASE_TGZ" -C "$APP_DIR"
          cd "$APP_DIR"
          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@10.18.3 --activate
          fi
          NODE_ENV=development pnpm install --frozen-lockfile --filter acs-orchestrator... --filter server... --filter shared...

          if command -v podman >/dev/null 2>&1; then
            CONTAINER_CLI=podman
          else
            CONTAINER_CLI=docker
          fi
          CONTAINER_TMPDIR="${CONTAINER_TMPDIR:-/mnt/agent-saas/runtime/container-tmp/github-actions}"
          mkdir -p "$CONTAINER_TMPDIR"
          export TMPDIR="$CONTAINER_TMPDIR"
          "$CONTAINER_CLI" load -i "$IMAGE_TAR"
          "$CONTAINER_CLI" tag "$LOCAL_IMAGE" "$IMAGE"

          if [ -f "$ENV_FILE" ]; then
            set -a
            # shellcheck disable=SC1090
            . "$ENV_FILE"
            set +a
          fi

          read_acr_auth_from_aliyun() {
            command -v aliyun >/dev/null 2>&1 || return 1
            local response
            if ! response="$(aliyun cr GetAuthorizationToken --RegionId "$ACR_REGION_ID" --InstanceId "$ACR_INSTANCE_ID")"; then
              echo "Aliyun ACR authorization token command failed; trying imagePullSecret fallback" >&2
              return 1
            fi
            ACR_AUTH_JSON="$response" node <<'NODE'
          const payload = JSON.parse(process.env.ACR_AUTH_JSON || '{}');
          const usernameKeys = ['TempUsername', 'Username', 'UserName', 'username'];
          const passwordKeys = ['AuthorizationToken', 'TempPassword', 'Password', 'password', 'Token', 'token'];
          function findValue(input, keys) {
            if (!input || typeof input !== 'object') return undefined;
            for (const key of keys) {
              if (typeof input[key] === 'string' && input[key]) return input[key];
            }
            for (const value of Object.values(input)) {
              const found = findValue(value, keys);
              if (found) return found;
            }
            return undefined;
          }
          const username = findValue(payload, usernameKeys);
          const password = findValue(payload, passwordKeys);
          if (payload.IsSuccess === false || (!username || !password)) {
            const code = payload.Code || 'unknown';
            const message = payload.Message || payload.MessageDetail || 'missing username/password';
            console.error(`Aliyun ACR token auth unavailable: code=${code}; message=${message}`);
            process.exit(1);
          }
          process.stdout.write(`${username}\n${password}\n`);
          NODE
          }

          read_acr_auth_from_pull_secret() {
            command -v kubectl >/dev/null 2>&1 || return 1
            local kube_args=()
            if [ -n "${ACS_KUBECONFIG:-}" ]; then
              kube_args=(--kubeconfig "$ACS_KUBECONFIG")
            fi
            local docker_config_b64
            if ! docker_config_b64="$(kubectl "${kube_args[@]}" -n "${ACS_NAMESPACE:-agent-saas-coding}" get secret acr-agentsaasacrprod -o jsonpath='{.data.\.dockerconfigjson}')"; then
              echo "Unable to read ACR imagePullSecret for deploy login" >&2
              return 1
            fi
            DOCKER_CONFIG_JSON="$(printf '%s' "$docker_config_b64" | base64 -d)" ACR_REGISTRY="$ACR_REGISTRY" node <<'NODE'
          const config = JSON.parse(process.env.DOCKER_CONFIG_JSON || '{}');
          const auths = config.auths || {};
          const entry = auths[process.env.ACR_REGISTRY] || Object.values(auths)[0];
          if (!entry) {
            console.error('ACR imagePullSecret docker config has no auth entry');
            process.exit(1);
          }
          let username = entry.username;
          let password = entry.password;
          if ((!username || !password) && entry.auth) {
            const decoded = Buffer.from(entry.auth, 'base64').toString('utf8');
            const index = decoded.indexOf(':');
            if (index > 0) {
              username = decoded.slice(0, index);
              password = decoded.slice(index + 1);
            }
          }
          if (!username || !password) {
            console.error('ACR imagePullSecret auth entry is missing username/password');
            process.exit(1);
          }
          process.stdout.write(`${username}\n${password}\n`);
          NODE
          }

          if [ -n "${ACR_USERNAME:-}" ] && [ -n "${ACR_PASSWORD:-}" ]; then
            ACR_AUTH_PARSED="$(printf '%s\n%s\n' "$ACR_USERNAME" "$ACR_PASSWORD")"
          elif ! ACR_AUTH_PARSED="$(read_acr_auth_from_aliyun)"; then
            ACR_AUTH_PARSED="$(read_acr_auth_from_pull_secret)"
          fi
          ACR_USERNAME="$(printf '%s\n' "$ACR_AUTH_PARSED" | sed -n '1p')"
          ACR_PASSWORD="$(printf '%s\n' "$ACR_AUTH_PARSED" | sed -n '2p')"
          unset ACR_AUTH_PARSED
          printf '%s' "$ACR_PASSWORD" | "$CONTAINER_CLI" login "$ACR_REGISTRY" --username "$ACR_USERNAME" --password-stdin
          unset ACR_PASSWORD
          "$CONTAINER_CLI" push "$IMAGE"
          "$CONTAINER_CLI" logout "$ACR_REGISTRY" || true

          test -f "$ENV_FILE"
          cp "$ENV_FILE" "${ENV_FILE}.bak.${GITHUB_RUN_ID}-${GITHUB_SHA:0:7}"
          if grep -q '^ACS_SANDBOX_IMAGE=' "$ENV_FILE"; then
            sed -i "s|^ACS_SANDBOX_IMAGE=.*|ACS_SANDBOX_IMAGE=${IMAGE}|" "$ENV_FILE"
          else
            printf '\nACS_SANDBOX_IMAGE=%s\n' "$IMAGE" >> "$ENV_FILE"
          fi
          systemctl restart "$ACS_SERVICE_NAME"
          systemctl is-active "$ACS_SERVICE_NAME"

          for _ in $(seq 1 120); do
            if curl -fsS http://10.0.1.1:3400/health >/tmp/acs-health.json; then
              grep -F "$IMAGE" /tmp/acs-health.json >/dev/null
              break
            fi
            sleep 1
          done
          grep -F "$IMAGE" /tmp/acs-health.json >/dev/null

          set -a
          # shellcheck disable=SC1090
          . "$ENV_FILE"
          set +a
          : "${ACS_ORCH_AUTH_TOKEN:?missing ACS_ORCH_AUTH_TOKEN in env file}"

          SMOKE_WS="ws_ci_acs_${GITHUB_RUN_ID}"
          SMOKE_SESSION="ci-acs-${GITHUB_RUN_ID}"
          SMOKE_MOUNT="workspaces/_ci/${SMOKE_WS}"
          export SMOKE_WS SMOKE_SESSION SMOKE_MOUNT
          AUTH_HEADER="Authorization: Bearer ${ACS_ORCH_AUTH_TOKEN}"

          curl -fsS -m 420 -X POST http://10.0.1.1:3400/provision \
            -H "$AUTH_HEADER" \
            -H 'Content-Type: application/json' \
            -d "{\"workspaceId\":\"${SMOKE_WS}\",\"recipe\":{\"workspaceId\":\"${SMOKE_WS}\",\"sessionId\":\"${SMOKE_SESSION}\",\"mountSubPath\":\"${SMOKE_MOUNT}\"}}" \
            >/tmp/acs-provision.json
          grep -F '"status":"ok"' /tmp/acs-provision.json >/dev/null

          node <<'NODE' >/tmp/acs-execute-payload.json
          const command = [
            'set -eu',
            'test "$(id -u)" = 501',
            'test "$(pwd)" = /workspace',
            'test "$(which python3)" = /workspace/.ky-agent/runtime/venv/bin/python3',
            'test "$VIRTUAL_ENV" = /workspace/.ky-agent/runtime/venv',
            'test "$PIP_CACHE_DIR" = /workspace/.ky-agent/runtime/cache/pip',
            'test "$PLAYWRIGHT_BROWSERS_PATH" = /ms-playwright',
            'test "$MPLBACKEND" = Agg',
            'test "$(cat /etc/timezone)" = Asia/Shanghai',
            'test "$(readlink -f /etc/localtime)" = /usr/share/zoneinfo/Asia/Shanghai',
            'for c in openssl ffmpeg ffprobe convert identify soffice pandoc pdftotext qpdf gs tesseract fc-match; do command -v "$c" >/dev/null; done',
            'fc-match "Noto Sans CJK SC" | grep -Ei "Noto|CJK|Sans" >/dev/null',
            'python3 - <<\\PY',
            'import requests, httpx, aiohttp, bs4, lxml, numpy, pandas, pyarrow, openpyxl, docx, pptx, PIL, jinja2, markdown, pypdf, pdfplumber, fitz, reportlab, matplotlib, sqlalchemy, pymysql, psycopg, redis, dotenv, yaml, jieba, sklearn, playwright',
            'print("PYTHON_BASE_IMPORTS_OK")',
            'PY',
            'node - <<\\NODE',
            'const { chromium } = require("/app/server/node_modules/playwright");',
            '(async () => {',
            '  const browser = await chromium.launch({ headless: true, args: ["--disable-dev-shm-usage"] });',
            '  const page = await browser.newPage();',
            '  await page.setContent("<html><body><h1>中文测试</h1></body></html>");',
            '  await page.screenshot({ path: "/tmp/playwright-smoke.png" });',
            '  await browser.close();',
            '  console.log("PLAYWRIGHT_CHROMIUM_OK");',
            '})().catch((err) => { console.error(err); process.exit(1); });',
            'NODE',
            'echo ACS_SANDBOX_DEPLOY_SMOKE_OK',
          ].join('\n');
          process.stdout.write(JSON.stringify({
            toolName: 'Shell',
            input: { command, timeoutMs: 120000 },
            context: {
              workspace: {
                id: process.env.SMOKE_WS,
                sessionId: process.env.SMOKE_SESSION,
                mountSubPath: process.env.SMOKE_MOUNT,
              },
            },
          }));
          NODE

          curl -fsS -m 420 -X POST http://10.0.1.1:3400/execute \
            -H "$AUTH_HEADER" \
            -H 'Content-Type: application/json' \
            --data-binary @/tmp/acs-execute-payload.json \
            >/tmp/acs-execute.json
          grep -F 'ACS_SANDBOX_DEPLOY_SMOKE_OK' /tmp/acs-execute.json >/dev/null
          REMOTE
