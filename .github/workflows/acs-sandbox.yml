name: ACS Sandbox

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.npmrc'
      - 'patches/**'
      - 'acs-orchestrator/**'
      - 'server/src/agent/**'
      - 'server/src/runtime/handProtocol.ts'
      - 'server/src/runtime/httpTransport.ts'
      - 'server/src/runtime/inProcessTransport.ts'
      - 'server/src/runtime/clientDaemonTransport.ts'
      - 'server/src/runtime/networkPolicy.ts'
      - 'server/src/runtime/rawAgentLoop.ts'
      - 'server/src/runtime/rawRuntimeRunDispatch.ts'
      - 'server/src/runtime/handStore.ts'
      - 'server/src/data/tenants/types.ts'
      - 'server/package.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/acs-sandbox.yml'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  ACR_REGISTRY: agentsaasacrprod-registry-vpc.cn-shenzhen.cr.aliyuncs.com
  ACR_REPOSITORY: agent-saas/acs-sandbox
  ACR_INSTANCE_ID: cri-tapxtcyd6odwj3m4
  ACR_REGION_ID: cn-shenzhen
  ECS_DEPLOY_ROOT: /opt/agent-saas
  ACS_SERVICE_NAME: agent-saas-acs-orchestrator.service

jobs:
  changes:
    name: Classify ACS Impact
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      publish: ${{ steps.filter.outputs.publish }}
      contract_check: ${{ steps.filter.outputs.contract_check }}
      reason: ${{ steps.filter.outputs.reason }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          publish=false
          contract_check=false
          reasons=()
          skipped=()
          changed_files="$RUNNER_TEMP/acs-changed-files.txt"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            publish=true
            reasons+=("manual workflow_dispatch")
            : > "$changed_files"
          else
            before="${BEFORE_SHA:-}"
            zero_sha="0000000000000000000000000000000000000000"
            if [ -n "$before" ] && [ "$before" != "$zero_sha" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
              git diff --name-only "$before" "$GITHUB_SHA" > "$changed_files"
              base_sha="$before"
            else
              git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > "$changed_files"
              base_sha="$(git rev-parse "$GITHUB_SHA^" 2>/dev/null || true)"
            fi

            package_json_affects_acs() {
              if [ -z "${base_sha:-}" ] || ! git cat-file -e "$base_sha:package.json" 2>/dev/null; then
                return 0
              fi

              BASE_SHA="$base_sha" node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');

          const baseSha = process.env.BASE_SHA;

          function readJsonAt(ref, file) {
            return JSON.parse(execFileSync('git', ['show', `${ref}:${file}`], { encoding: 'utf8' }));
          }

          function pickRuntimeFields(pkg) {
            return {
              packageManager: pkg.packageManager,
              postinstall: pkg.scripts?.postinstall,
              dependencies: pkg.dependencies,
              devDependencies: pkg.devDependencies,
              optionalDependencies: pkg.optionalDependencies,
              peerDependencies: pkg.peerDependencies,
              pnpm: pkg.pnpm,
              overrides: pkg.overrides,
              resolutions: pkg.resolutions,
              patchedDependencies: pkg.patchedDependencies,
            };
          }

          try {
            const before = pickRuntimeFields(readJsonAt(baseSha, 'package.json'));
            const after = pickRuntimeFields(JSON.parse(fs.readFileSync('package.json', 'utf8')));
            process.exit(JSON.stringify(before) === JSON.stringify(after) ? 1 : 0);
          } catch (err) {
            console.error(err instanceof Error ? err.message : String(err));
            process.exit(0);
          }
          NODE
            }

            is_publish_path() {
              case "$1" in
                Dockerfile|.dockerignore|.npmrc|pnpm-workspace.yaml|.github/workflows/acs-sandbox.yml)
                  return 0
                  ;;
                acs-orchestrator/*|patches/*|server/package.json|server/src/data/tenants/types.ts)
                  return 0
                  ;;
                server/src/agent/toolRuntime.ts|server/src/agent/workspaceHandTools.ts|server/src/agent/toolOutput.ts|server/src/agent/shellOutputFiles.ts|server/src/agent/containerExecutionProvider.ts|server/src/agent/memorySearchToolProvider.ts|server/src/agent/tools/descriptionLoader.ts)
                  return 0
                  ;;
                server/src/agent/descriptions/Read.md|server/src/agent/descriptions/Write.md|server/src/agent/descriptions/List.md|server/src/agent/descriptions/Shell.md|server/src/agent/descriptions/WaitForWorkspaceReady.md|server/src/agent/descriptions/Edit.md|server/src/agent/descriptions/Glob.md|server/src/agent/descriptions/Grep.md|server/src/agent/descriptions/CreateArtifact.md|server/src/agent/descriptions/MemorySearch.md|server/src/agent/descriptions/MemoryList.md)
                  return 0
                  ;;
                server/src/runtime/handProtocol.ts|server/src/runtime/httpTransport.ts|server/src/runtime/inProcessTransport.ts|server/src/runtime/clientDaemonTransport.ts|server/src/runtime/handStore.ts|server/src/runtime/networkPolicy.ts)
                  return 0
                  ;;
              esac
              return 1
            }

            is_contract_check_path() {
              case "$1" in
                server/src/runtime/rawAgentLoop.ts|server/src/runtime/rawRuntimeRunDispatch.ts)
                  return 0
                  ;;
              esac
              return 1
            }

            lock_changed=false
            while IFS= read -r file; do
              [ -n "$file" ] || continue

              if [ "$file" = "package.json" ]; then
                if package_json_affects_acs; then
                  publish=true
                  reasons+=("package.json runtime fields")
                else
                  skipped+=("package.json scripts/non-runtime fields")
                fi
                continue
              fi

              if [ "$file" = "pnpm-lock.yaml" ]; then
                lock_changed=true
                continue
              fi

              if is_publish_path "$file"; then
                publish=true
                reasons+=("$file")
                continue
              fi

              if is_contract_check_path "$file"; then
                contract_check=true
                reasons+=("$file contract check")
                continue
              fi

              skipped+=("$file")
            done < "$changed_files"

            if [ "$lock_changed" = true ]; then
              if [ "$publish" = true ]; then
                reasons+=("pnpm-lock.yaml paired with ACS publish path")
              else
                skipped+=("pnpm-lock.yaml without ACS package/source change")
              fi
            fi
          fi

          join_items() {
            if [ "$#" -eq 0 ]; then
              printf 'none'
              return 0
            fi
            local first=true
            for item in "$@"; do
              if [ "$first" = true ]; then
                printf '%s' "$item"
                first=false
              else
                printf '; %s' "$item"
              fi
            done
          }

          if [ "${#reasons[@]}" -gt 0 ]; then
            reason="$(join_items "${reasons[@]}")"
          else
            reason="none"
          fi
          if [ "${#skipped[@]}" -gt 0 ]; then
            skipped_reason="$(join_items "${skipped[@]}")"
          else
            skipped_reason="none"
          fi

          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "contract_check=$contract_check" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

          {
            echo "### ACS impact classification"
            echo
            echo "- publish: \`$publish\`"
            echo "- contract_check: \`$contract_check\`"
            echo "- publish reasons: $reason"
            echo "- skipped inputs: $skipped_reason"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "ACS publish=$publish contract_check=$contract_check reason=$reason"

  contract-check:
    name: ACS Contract Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.publish != 'true' && needs.changes.outputs.contract_check == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck server and orchestrator
        run: |
          pnpm -F server typecheck
          pnpm -F acs-orchestrator typecheck

      - name: Test orchestrator
        run: pnpm -F acs-orchestrator test

  # ── 方案 C（2026-07-04 曾磊拍板）: 镜像构建全部在阿里云 ACR EE 源码构建完成 ──
  # GitHub Actions 只做两件事:
  #   gate: typecheck + test（push/dispatch 都跑, 代码门禁）
  #   build-deploy (dispatch only): 调 ACR OpenAPI 触发云端构建 → 轮询到
  #     SUCCESS → scp orchestrator 源码到 ECS → drain 旧进程(SIGUSR2) →
  #     systemd 自动拉起新代码+新镜像 env → health/smoke → 失败自动回滚 env。
  # 收益: push 零跨境镜像流量、零 GitHub artifact、build 5-10min(原 25-35min)、
  #   全部日志在 GitHub Actions 单一界面。
  # ACR 侧一次性配置(2026-07-04 完成): GitHub OAuth 绑定 + source repo
  #   ZengLeiPro/agent-saas + build rule crbr-xgrdo809of1uj6in
  #   (branches:main, Dockerfile /, tag=${GIT_PUSH_DATE:yyyyMMddHHmm}-${GIT_COMMIT_ID:6},
  #   linux/amd64, 自动构建关闭、海外源智能加速开启、缓存开启)。
  gate:
    name: Gate (typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.publish == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck orchestrator and server
        run: |
          pnpm -F acs-orchestrator typecheck
          pnpm -F server typecheck

      - name: Test orchestrator
        run: pnpm -F acs-orchestrator test

  build-deploy:
    name: ACR Cloud Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, gate]
    # 生产部署只走手动 dispatch（与主服务 ci.yml 同一纪律: push 归 push, 部署归部署）
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && needs.gate.result == 'success'

    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      ALIYUN_AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      ACR_INSTANCE_ID: cri-tapxtcyd6odwj3m4
      ACR_REPO_ID: crr-csx99pbexlsw5qqv
      ACR_BUILD_RULE_ID: crbr-xgrdo809of1uj6in
      ACR_REGION_ID: cn-shenzhen

    steps:
      - name: Install aliyun CLI
        run: |
          curl -fsSL "https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz" -o aliyun.tgz
          tar xzf aliyun.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun version

      # 不主动触发构建: build rule 的 tag 变量 ${GIT_PUSH_DATE}/${GIT_COMMIT_ID}
      # 只在 push 事件自动构建时有值, API 手动触发会解析为空 tag "-"（2026-07-04
      # 首次实测踩坑）。因此 ACR 侧开启「代码变更自动构建」, push main 即自动
      # build; 本 job 只按当前 HEAD sha 查找对应构建记录并等它 SUCCESS。
      # 附带收益: dispatch deploy 时镜像通常已 ready, deploy 全程 2-3min。
      - name: Wait for ACR auto-build of HEAD (poll every 30s)
        id: wait
        run: |
          : "${ALIYUN_AK:?Missing secret ALIYUN_ACCESS_KEY_ID}"
          : "${ALIYUN_SK:?Missing secret ALIYUN_ACCESS_KEY_SECRET}"
          SHA6="${GITHUB_SHA:0:6}"
          echo "Looking for ACR build record with tag suffix -$SHA6 (HEAD $GITHUB_SHA) ..."
          for i in $(seq 1 60); do
            aliyun cr ListRepoBuildRecord \
              --mode AK --access-key-id "$ALIYUN_AK" --access-key-secret "$ALIYUN_SK" \
              --region "$ACR_REGION_ID" \
              --InstanceId "$ACR_INSTANCE_ID" \
              --RepoId "$ACR_REPO_ID" \
              --PageNo 1 --PageSize 20 >/tmp/records.json 2>/dev/null || true
            result=$(python3 - "$SHA6" <<'PY'
          import json, sys
          sha6 = sys.argv[1]
          try:
              data = json.load(open('/tmp/records.json'))
          except Exception:
              print('PARSE_ERROR'); raise SystemExit
          for r in data.get('BuildRecords', []):
              tag = (r.get('Image') or {}).get('ImageTag', '')
              if tag.endswith('-' + sha6):
                  print(f"{r.get('BuildStatus','')}\t{tag}")
                  break
          else:
              print('NOT_FOUND')
          PY
            )
            bstatus=$(echo "$result" | cut -f1)
            btag=$(echo "$result" | cut -f2 -s)
            echo "  [$i] $bstatus ${btag:-}"
            case "$bstatus" in
              SUCCESS)
                echo "image_tag=$btag" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              FAILED|CANCELED)
                echo "ACR build $bstatus — 构建日志: https://cr.console.aliyun.com/repository/cn-shenzhen/$ACR_INSTANCE_ID/agent-saas/acs-sandbox/build" >&2
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "no SUCCESS build record for HEAD within 30min — 确认 push 是否触发了 ACR 自动构建" >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Pack orchestrator release
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./*/node_modules' \
            --exclude='./server/data' \
            --exclude='./logs' \
            --exclude='./config.json' \
            --exclude='./config.json.*' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./mobile/ios' \
            --exclude='./mobile/android' \
            -czf "$RUNNER_TEMP/agent-saas-acs-release.tgz" .
          # 输出必须放 RUNNER_TEMP：写进 checkout 目录会让 tar 读到 "." 目录
          # mtime 变化，报 "file changed as we read it" 并 exit 1（2026-07-04 首跑实测）

      - name: Configure SSH
        run: |
          : "${ECS_HOST:?Missing secret ECS_HOST}"
          : "${ECS_USER:?Missing secret ECS_USER}"
          : "${ECS_SSH_KEY:?Missing secret ECS_SSH_KEY}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Upload orchestrator release
        run: |
          scp -i ~/.ssh/ecs_deploy_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$RUNNER_TEMP/agent-saas-acs-release.tgz" "$ECS_USER@$ECS_HOST:/tmp/"

      - name: Deploy orchestrator with drain and smoke
        run: |
          IMAGE_TAG='${{ steps.wait.outputs.image_tag }}'
          IMAGE="agentsaasacrprod-registry-vpc.cn-shenzhen.cr.aliyuncs.com/agent-saas/acs-sandbox:${IMAGE_TAG}"
          ssh -i ~/.ssh/ecs_deploy_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$ECS_USER@$ECS_HOST" \
            "IMAGE='$IMAGE' IMAGE_TAG='$IMAGE_TAG' ECS_DEPLOY_ROOT='$ECS_DEPLOY_ROOT' ACS_SERVICE_NAME='$ACS_SERVICE_NAME' GITHUB_RUN_ID='$GITHUB_RUN_ID' GITHUB_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          : "${IMAGE:?missing IMAGE}"
          : "${IMAGE_TAG:?missing IMAGE_TAG}"
          : "${ECS_DEPLOY_ROOT:?missing ECS_DEPLOY_ROOT}"
          : "${ACS_SERVICE_NAME:?missing ACS_SERVICE_NAME}"

          APP_DIR="$ECS_DEPLOY_ROOT"
          ENV_FILE="/etc/agent-saas/acs-orchestrator.env"
          RELEASE_TGZ="/tmp/agent-saas-acs-release.tgz"
          # 07-05：SMOKE_SESSION 提前定型（改进 1A）。历史残留 CI sandbox（3d8h 前那批）
          # 是因为 SMOKE_SESSION 之前在第 5 步 smoke 阶段才赋值——provision/deploy 阶段失败时
          # cleanup 走到、SMOKE_SESSION 还是空 → cleanup 什么也不删 → sandbox 残留 7 天 TTL。
          # 现在提前赋值，无论后续哪步失败，都能按 session-id 找到并清理 smoke sandbox。
          SMOKE_SESSION="ci-acr-${GITHUB_RUN_ID}"

          cleanup() {
            if [ -n "${SMOKE_SESSION:-}" ] && command -v kubectl >/dev/null 2>&1; then
              if [ -n "${ACS_KUBECONFIG:-}" ]; then KCFG_ARGS="--kubeconfig ${ACS_KUBECONFIG}"; else KCFG_ARGS=""; fi
              # shellcheck disable=SC2086
              kubectl $KCFG_ARGS -n "${ACS_NAMESPACE:-agent-saas-coding}" delete sandbox \
                -l "agent-saas.kaiyan.net/session-id=${SMOKE_SESSION}" --ignore-not-found=true >/dev/null 2>&1 || true
            fi
            rm -f "$RELEASE_TGZ"
          }
          trap cleanup EXIT

          # ── 1. 更新 orchestrator 源码（旧进程还在跑, 零影响）──
          mkdir -p "$APP_DIR"
          tar -xzf "$RELEASE_TGZ" -C "$APP_DIR"
          cd "$APP_DIR"
          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@10.18.3 --activate
          fi
          NODE_ENV=development pnpm install --frozen-lockfile --filter acs-orchestrator... --filter server... --filter shared...

          # ── 2. 备份并更新镜像 env（新进程拉起时生效）──
          test -f "$ENV_FILE"
          ENV_BAK="${ENV_FILE}.bak.${GITHUB_RUN_ID}-${GITHUB_SHA:0:7}"
          cp "$ENV_FILE" "$ENV_BAK"
          if grep -q '^ACS_SANDBOX_IMAGE=' "$ENV_FILE"; then
            sed -i "s|^ACS_SANDBOX_IMAGE=.*|ACS_SANDBOX_IMAGE=${IMAGE}|" "$ENV_FILE"
          else
            printf '\nACS_SANDBOX_IMAGE=%s\n' "$IMAGE" >> "$ENV_FILE"
          fi

          # ── 3. Drain 旧进程: SIGUSR2 → 排空 inflight 后自退 →
          #      systemd Restart=always 5s 后自动拉起新代码+新 env ──
          MAIN_PID=$(systemctl show -p MainPID --value "$ACS_SERVICE_NAME" 2>/dev/null || echo 0)
          if [ "$MAIN_PID" != "0" ] && [ -n "$MAIN_PID" ]; then
            echo "draining orchestrator pid=$MAIN_PID (SIGUSR2)..."
            kill -USR2 "$MAIN_PID" 2>/dev/null || true
            for _ in $(seq 1 135); do
              kill -0 "$MAIN_PID" 2>/dev/null || break
              sleep 1
            done
            if kill -0 "$MAIN_PID" 2>/dev/null; then
              echo "drain deadline exceeded, falling back to systemctl restart"
              systemctl restart "$ACS_SERVICE_NAME"
            fi
          else
            systemctl restart "$ACS_SERVICE_NAME"
          fi

          # ── 4. 等新进程 health 且 image 已切换 ──
          HEALTH_OK=false
          for _ in $(seq 1 120); do
            if curl -fsS -m 5 http://127.0.0.1:3400/health >/tmp/acs-health.json 2>/dev/null; then
              if grep -F "$IMAGE" /tmp/acs-health.json >/dev/null; then
                HEALTH_OK=true
                break
              fi
            fi
            sleep 1
          done

          rollback() {
            echo "ROLLING BACK env to previous image..."
            cp "$ENV_BAK" "$ENV_FILE"
            systemctl restart "$ACS_SERVICE_NAME"
            for _ in $(seq 1 60); do
              if curl -fsS -m 5 http://127.0.0.1:3400/health >/dev/null 2>&1; then
                echo "rollback health ok"
                return 0
              fi
              sleep 1
            done
            echo "ROLLBACK HEALTH ALSO FAILED — manual intervention required" >&2
            return 1
          }

          if [ "$HEALTH_OK" != "true" ]; then
            echo "health/image check failed after 120s" >&2
            journalctl -u "$ACS_SERVICE_NAME" -n 100 --no-pager || true
            rollback
            exit 1
          fi

          # ── 5. Smoke: provision + execute 真实拉新镜像跑通 ──
          set -a
          # shellcheck disable=SC1090
          . "$ENV_FILE"
          set +a
          : "${ACS_ORCH_AUTH_TOKEN:?missing ACS_ORCH_AUTH_TOKEN in env file}"

          SMOKE_WS="ws_ci_acr_${GITHUB_RUN_ID}"
          # SMOKE_SESSION 已在 cleanup 定义前赋值（07-05 改进 1A），此处不再重复
          SMOKE_MOUNT="workspaces/_ci/${SMOKE_WS}"
          AUTH_HEADER="Authorization: Bearer ${ACS_ORCH_AUTH_TOKEN}"

          SMOKE_OK=true
          if ! curl -fsS -m 420 -X POST http://127.0.0.1:3400/provision \
            -H "$AUTH_HEADER" -H 'Content-Type: application/json' \
            -d "{\"workspaceId\":\"${SMOKE_WS}\",\"recipe\":{\"workspaceId\":\"${SMOKE_WS}\",\"sessionId\":\"${SMOKE_SESSION}\",\"mountSubPath\":\"${SMOKE_MOUNT}\"}}" \
            >/tmp/acs-provision.json; then
            SMOKE_OK=false
          elif ! grep -F '"status":"ok"' /tmp/acs-provision.json >/dev/null; then
            SMOKE_OK=false
          fi

          if [ "$SMOKE_OK" = "true" ]; then
            printf '%s' "{\"toolName\":\"Shell\",\"input\":{\"command\":\"set -eu; test \\\"\$(id -u)\\\" = 501; test \\\"\$(pwd)\\\" = /workspace; command -v aliyun; aliyun version; command -v gh; gh --version; echo ACR_BUILD_DEPLOY_SMOKE_OK\",\"timeoutMs\":120000},\"context\":{\"workspace\":{\"id\":\"${SMOKE_WS}\",\"sessionId\":\"${SMOKE_SESSION}\",\"mountSubPath\":\"${SMOKE_MOUNT}\"}}}" >/tmp/acs-execute-payload.json
            if ! curl -fsS -m 420 -X POST http://127.0.0.1:3400/execute \
              -H "$AUTH_HEADER" -H 'Content-Type: application/json' \
              --data-binary @/tmp/acs-execute-payload.json >/tmp/acs-execute.json; then
              SMOKE_OK=false
            elif ! grep -F 'ACR_BUILD_DEPLOY_SMOKE_OK' /tmp/acs-execute.json >/dev/null; then
              SMOKE_OK=false
            fi
          fi

          if [ "$SMOKE_OK" != "true" ]; then
            echo "SMOKE FAILED — dumping diagnostics" >&2
            cat /tmp/acs-provision.json 2>/dev/null || true
            cat /tmp/acs-execute.json 2>/dev/null || true
            if command -v kubectl >/dev/null 2>&1; then
              if [ -n "${ACS_KUBECONFIG:-}" ]; then KCFG_ARGS="--kubeconfig ${ACS_KUBECONFIG}"; else KCFG_ARGS=""; fi
              # imagePullSecret 401 是历史高发根因(2026-06-29), events 里最直观
              # shellcheck disable=SC2086
              kubectl $KCFG_ARGS -n "${ACS_NAMESPACE:-agent-saas-coding}" get events --sort-by=.lastTimestamp 2>/dev/null | tail -20 || true
            fi
            rollback
            exit 1
          fi

          if command -v kubectl >/dev/null 2>&1; then
            if [ -n "${ACS_KUBECONFIG:-}" ]; then KCFG_ARGS="--kubeconfig ${ACS_KUBECONFIG}"; else KCFG_ARGS=""; fi
            # shellcheck disable=SC2086
            kubectl $KCFG_ARGS -n "${ACS_NAMESPACE:-agent-saas-coding}" get sandbox \
              -l "app.kubernetes.io/managed-by=agent-saas-acs-orchestrator" \
              -o json >/tmp/acs-sandboxes.json 2>/dev/null || true
            if [ -s /tmp/acs-sandboxes.json ]; then
              CURRENT_IMAGE="$IMAGE" node <<'NODE'
          const fs = require('node:fs');
          const body = JSON.parse(fs.readFileSync('/tmp/acs-sandboxes.json', 'utf8') || '{"items":[]}');
          const items = Array.isArray(body.items) ? body.items : [];
          const currentImage = process.env.CURRENT_IMAGE;
          const byPhaseImage = new Map();
          let stalePaused = 0;
          for (const item of items) {
            const phase = item?.status?.phase || 'Unknown';
            const containers = item?.spec?.template?.spec?.containers || [];
            const image = containers.find((container) => !container.name || container.name === 'sandbox')?.image || 'unknown';
            if (phase === 'Paused' && image !== currentImage) stalePaused += 1;
            const key = `${phase}\t${image}`;
            byPhaseImage.set(key, (byPhaseImage.get(key) || 0) + 1);
          }
          console.log(`ACS sandbox inventory: total=${items.length} stalePaused=${stalePaused}`);
          for (const [key, count] of [...byPhaseImage.entries()].sort()) {
            const [phase, image] = key.split('\t');
            console.log(`  ${phase} x${count} ${image}`);
          }
          NODE
            fi
          fi

          echo "ACS deploy OK: $IMAGE"
          REMOTE
