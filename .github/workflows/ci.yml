# ============================================================================
# CI/CD Pipeline: install → typecheck → test → build → deploy ECS（蓝绿零停机）
# ============================================================================
# 触发:
#   - push to main: 只构建 + 测试 + 打包 artifact（不部署生产）
#   - workflow_dispatch: 构建通过后部署生产（Actions 页面手动触发，
#     或 `gh workflow run ci.yml`）
# 部署与发布解耦: 多 agent 共享仓库高频 push，push ≠ 上生产；
# 想发版时手动触发一次 dispatch。
# 蓝绿部署脚本: 读 /etc/agent-saas/active-color 定位 idle 色 → 解包新 release →
#   只改 idle 色 symlink（active 色 symlink 永不动）→ start idle 实例 →
#   ready(180s) 门禁 + warmup(420s 软门禁) + 冒烟 → 重写 nginx upstream +
#   reload 切流 → 更新 active-color → 生成蓝绿 rollback.sh →
#   SIGUSR2 精确 drain 旧色（活跃流清空后自退，Restart=on-failure 不复活）。
#   切流前任何失败只回收 idle 色并还原 current/previous/idle 色 symlink，
#   老色全程在服务，用户零影响。
# 零停机门禁(P2): 部署期间 runner 每 1s 探测公网 healthz，
#   最大连续非 200 ≥ 2 即判失败（容忍单次公网抖动）。
# ============================================================================

name: App CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck server
        run: pnpm -F server typecheck

      - name: Run tests
        run: pnpm test

      - name: Scenarios sanitize check
        run: pnpm sanitize-check

      # web build 内含 tsc，同时完成 typecheck + vite build
      - name: Build frontend
        run: pnpm -F web build

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    # 覆盖构建打包(~8min) + 远端蓝绿部署最坏路径(~34min)
    timeout-minutes: 45
    needs: build
    # 生产部署只走手动触发（workflow_dispatch），push main 不再自动上生产
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'

    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      DEPLOY_ROOT: /opt/agent-saas-app
      # systemd 模板单元前缀：实际实例为 agent-saas-server@blue / agent-saas-server@green
      SERVICE_NAME: agent-saas-server

    steps:
      # 部署产物不走 GitHub artifact（存储配额有限且用量重算延迟 6-12h，
      # 2026-07-03 曾因配额爆掉全线 CI 红）；deploy job 自构建后直接 scp。
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -F web build

      - name: Pack ECS release
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./*/node_modules' \
            --exclude='./server/data' \
            --exclude='./logs' \
            --exclude='./config.json' \
            --exclude='./config.json.*' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./mobile/ios' \
            --exclude='./mobile/android' \
            -czf "$RUNNER_TEMP/agent-saas-release.tgz" .
          mv "$RUNNER_TEMP/agent-saas-release.tgz" agent-saas-release.tgz

      - name: Configure SSH
        run: |
          : "${ECS_HOST:?Missing secret ECS_HOST}"
          : "${ECS_USER:?Missing secret ECS_USER}"
          : "${ECS_SSH_KEY:?Missing secret ECS_SSH_KEY}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp -i ~/.ssh/ecs_deploy_key \
            -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            agent-saas-release.tgz \
            "$ECS_USER@$ECS_HOST:/tmp/agent-saas-${GITHUB_SHA}.tgz"

      - name: Start zero-downtime probe
        run: |
          # 部署期零停机探测（P2 门禁）：每 1s 打一次生产公网 healthz，
          # 每行记录 "epoch http_code" 到 probe.log；
          # Deploy 结束后由 Assert zero downtime 步骤统计并守门。
          # 注意：前端域 agent.kaiyan.net 已 CNAME 到 OSS（2026-07-15 分域），
          # API/WS 生产入口是 api.agent.kaiyan.net → ECS nginx，探测必须打 API 域。
          : > "$RUNNER_TEMP/probe.log"
          (
            while true; do
              code=$(curl -s -o /dev/null -m 4 -w '%{http_code}' https://api.agent.kaiyan.net/api/healthz || true)
              [ -n "$code" ] || code=000
              echo "$(date +%s) $code"
              sleep 1
            done
          ) >> "$RUNNER_TEMP/probe.log" 2>/dev/null &
          echo $! > "$RUNNER_TEMP/probe.pid"
          echo "probe started pid=$(cat "$RUNNER_TEMP/probe.pid") log=$RUNNER_TEMP/probe.log"

      - name: Deploy and restart
        id: deploy
        timeout-minutes: 36
        run: |
          # 覆盖冷安装(~10min) + 残留 idle drain 等待(600s) + ready(180s)
          # + warmup(420s) + 旧色 drain 观察(60s)，并给 step 本身保留收尾余量。
          REMOTE_DEPLOY_TIMEOUT_SECONDS=2000
          echo "Remote deploy timeout: ${REMOTE_DEPLOY_TIMEOUT_SECONDS}s"
          timeout "${REMOTE_DEPLOY_TIMEOUT_SECONDS}s" ssh -i ~/.ssh/ecs_deploy_key \
            -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$ECS_USER@$ECS_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' SERVICE_NAME='$SERVICE_NAME' RELEASE_TGZ='/tmp/agent-saas-${GITHUB_SHA}.tgz' RELEASE_ID='${GITHUB_SHA}' bash -s" <<'REMOTE'
          # -E: 函数内失败也触发 ERR trap，保证任何失败都有 on_error 日志
          set -Eeuo pipefail

          : "${DEPLOY_ROOT:?missing DEPLOY_ROOT}"
          : "${SERVICE_NAME:?missing SERVICE_NAME}"
          : "${RELEASE_TGZ:?missing RELEASE_TGZ}"
          : "${RELEASE_ID:?missing RELEASE_ID}"

          APP_LINK="$DEPLOY_ROOT/current"
          PREV_LINK="$DEPLOY_ROOT/previous"
          RELEASES_DIR="$DEPLOY_ROOT/releases"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          COLOR_DIR="$DEPLOY_ROOT/color"
          DATA_DIR="/mnt/agent-saas/server-data"
          ACTIVE_COLOR_FILE="/etc/agent-saas/active-color"
          UPSTREAM_CONF="/etc/nginx/conf.d/agent-saas-upstream.conf"

          START_EPOCH=$(date +%s)
          elapsed_seconds() {
            echo $(( $(date +%s) - START_EPOCH ))
          }
          log() {
            printf '[remote %s +%ss] %s\n' "$(date -Is)" "$(elapsed_seconds)" "$*"
          }
          INSTALL_CLEANUP_ARMED=0
          TRAFFIC_SWITCHED=0
          on_error() {
            local status=$?
            trap - ERR
            log "ERROR status=$status line=$1 release=$RELEASE_ID"
            if [ "$TRAFFIC_SWITCHED" -eq 0 ]; then
              if [ "$INSTALL_CLEANUP_ARMED" -eq 1 ]; then
                case "$RELEASE_DIR" in
                  "$RELEASES_DIR"/*)
                    log "remove failed release: $RELEASE_DIR"
                    rm -rf -- "$RELEASE_DIR" || log "WARN: failed release cleanup failed"
                    ;;
                  *)
                    log "WARN: refuse failed release cleanup outside $RELEASES_DIR: $RELEASE_DIR"
                    ;;
                esac
              fi
              rm -f -- "$RELEASE_TGZ" || log "WARN: failed upload cleanup failed"
            fi
            exit "$status"
          }
          trap 'on_error $LINENO' ERR

          log "deploy start release=$RELEASE_ID root=$DEPLOY_ROOT service=$SERVICE_NAME"

          # ── 1. 前置校验：蓝绿标记与 active 实例必须就绪 ──
          if [ ! -f "$ACTIVE_COLOR_FILE" ]; then
            log "ERROR: $ACTIVE_COLOR_FILE missing; finish the one-time manual blue-green migration first"
            exit 1
          fi
          ACTIVE=$(tr -d '[:space:]' < "$ACTIVE_COLOR_FILE")
          case "$ACTIVE" in
            blue)  IDLE="green"; IDLE_PORT=3201; ACTIVE_PORT=3200 ;;
            green) IDLE="blue";  IDLE_PORT=3200; ACTIVE_PORT=3201 ;;
            *)
              log "ERROR: invalid active color '$ACTIVE' in $ACTIVE_COLOR_FILE (expect blue|green); finish the manual blue-green migration first"
              exit 1
              ;;
          esac
          if ! systemctl is-active --quiet "${SERVICE_NAME}@${ACTIVE}"; then
            log "ERROR: ${SERVICE_NAME}@${ACTIVE} is not active; finish the one-time manual blue-green migration first"
            exit 1
          fi
          log "colors resolved: active=$ACTIVE:$ACTIVE_PORT idle=$IDLE:$IDLE_PORT"

          READY_URL="http://127.0.0.1:$IDLE_PORT/api/healthz/ready"
          HEALTHZ_URL="http://127.0.0.1:$IDLE_PORT/api/healthz"
          DRAINZ_URL="http://127.0.0.1:$IDLE_PORT/api/healthz/drain"

          # ── 2. 发布前清理与容量门禁：先腾空间，再开始不可复用的安装工作 ──
          mkdir -p "$RELEASES_DIR" "$DATA_DIR" "$COLOR_DIR"
          KEEP_CURRENT=$(readlink "$APP_LINK" 2>/dev/null || true)
          KEEP_PREV=$(readlink "$PREV_LINK" 2>/dev/null || true)
          KEEP_BLUE=$(readlink "$COLOR_DIR/blue" 2>/dev/null || true)
          KEEP_GREEN=$(readlink "$COLOR_DIR/green" 2>/dev/null || true)

          is_protected_release() {
            local candidate="$1"
            [ "$candidate" = "$KEEP_CURRENT" ] || [ "$candidate" = "$KEEP_PREV" ] \
              || [ "$candidate" = "$KEEP_BLUE" ] || [ "$candidate" = "$KEEP_GREEN" ]
          }

          log "release cleanup start before install: keep newest 4 existing releases plus current/previous/color targets"
          (ls -dt "$RELEASES_DIR"/*/ 2>/dev/null || true) | tail -n +5 | while read -r old; do
            old="${old%/}"
            if [ -n "$old" ] && ! is_protected_release "$old"; then
              case "$old" in
                "$RELEASES_DIR"/*)
                  if [ -L "$old" ]; then
                    log "ERROR: refuse to prune release symlink: $old"
                    exit 1
                  fi
                  log "pruning old release: $old"
                  rm -rf -- "$old"
                  ;;
                *)
                  log "ERROR: refuse to prune path outside $RELEASES_DIR: $old"
                  exit 1
                  ;;
              esac
            fi
          done
          log "release cleanup done"

          if [ -e "$RELEASE_DIR" ]; then
            if [ "$RELEASE_DIR" = "$KEEP_CURRENT" ] && [ "$RELEASE_DIR" = "$(readlink "$COLOR_DIR/$ACTIVE" 2>/dev/null || true)" ]; then
              log "release is already active; remove duplicate upload and finish as idempotent no-op"
              rm -f -- "$RELEASE_TGZ"
              exit 0
            fi
            if is_protected_release "$RELEASE_DIR"; then
              log "ERROR: existing release is protected by previous/color target; use rollback instead of overwriting it: $RELEASE_DIR"
              rm -f -- "$RELEASE_TGZ"
              exit 1
            fi
            log "remove stale partial release: $RELEASE_DIR"
            rm -rf -- "$RELEASE_DIR"
          fi

          FREE_BYTES=$(df -B1 --output=avail "$RELEASES_DIR" | tail -n 1 | tr -d '[:space:]')
          FREE_INODES=$(df --output=iavail "$RELEASES_DIR" | tail -n 1 | tr -d '[:space:]')
          MIN_FREE_BYTES=$((8 * 1024 * 1024 * 1024))
          MIN_FREE_INODES=250000
          log "capacity preflight: free_bytes=$FREE_BYTES minimum=$MIN_FREE_BYTES free_inodes=$FREE_INODES minimum=$MIN_FREE_INODES"
          df -h "$RELEASES_DIR"
          df -i "$RELEASES_DIR"
          if [ "$FREE_BYTES" -lt "$MIN_FREE_BYTES" ] || [ "$FREE_INODES" -lt "$MIN_FREE_INODES" ]; then
            log "ERROR: insufficient disk capacity for isolated dependency install"
            rm -f -- "$RELEASE_TGZ"
            exit 1
          fi

          # ── 3. 解包 release + isolated 安装 server/shared 依赖 ──
          log "prepare release dir: $RELEASE_DIR"
          INSTALL_CLEANUP_ARMED=1
          mkdir -p "$RELEASE_DIR"
          log "extract release archive: $RELEASE_TGZ"
          tar -xzf "$RELEASE_TGZ" -C "$RELEASE_DIR"
          ln -sfn "$DATA_DIR" "$RELEASE_DIR/server/data"

          cd "$RELEASE_DIR"
          log "prepare pnpm"
          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@10.18.3 --activate
          fi
          log "remote pnpm isolated install start"
          NODE_ENV=development pnpm --config.node-linker=isolated --config.allow-unused-patches=true install --frozen-lockfile --filter server... --filter shared...
          log "remote pnpm install done"
          INSTALL_CLEANUP_ARMED=0

          # ── 4. idle 色残留处理：上次部署的旧色可能仍在 drain 未退 ──
          if systemctl is-active --quiet "${SERVICE_NAME}@${IDLE}"; then
            log "idle unit ${SERVICE_NAME}@${IDLE} still active (previous drain not finished); waiting up to 600s"
            IDLE_DRAIN_WAITED=0
            while systemctl is-active --quiet "${SERVICE_NAME}@${IDLE}"; do
              if [ "$IDLE_DRAIN_WAITED" -ge 600 ]; then
                log "WARN: idle unit still active after 600s; forcing systemctl stop (leftover streams may be interrupted)"
                systemctl stop "${SERVICE_NAME}@${IDLE}"
                break
              fi
              if [ $((IDLE_DRAIN_WAITED % 30)) -eq 0 ]; then
                log "idle unit still draining waited=${IDLE_DRAIN_WAITED}s"
              fi
              sleep 5
              IDLE_DRAIN_WAITED=$((IDLE_DRAIN_WAITED + 5))
            done
            log "idle unit ${SERVICE_NAME}@${IDLE} is now inactive"
          fi

          # ── 5. 更新 symlink：只动 idle 色；current/previous 仅作 bookkeeping ──
          PREV_CURRENT=$(readlink "$APP_LINK" 2>/dev/null || true)
          PREV_PREVIOUS=$(readlink "$PREV_LINK" 2>/dev/null || true)
          PREV_IDLE_TARGET=$(readlink "$COLOR_DIR/$IDLE" 2>/dev/null || true)
          PREVIOUS_UPDATED=0
          log "switch color/$IDLE: $(readlink "$COLOR_DIR/$IDLE" 2>/dev/null || echo '<none>') -> $RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$COLOR_DIR/$IDLE"
          log "switch current: ${PREV_CURRENT:-<none>} -> $RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$APP_LINK"
          if [ -n "$PREV_CURRENT" ] && [ "$PREV_CURRENT" != "$RELEASE_DIR" ]; then
            ln -sfn "$PREV_CURRENT" "$PREV_LINK"
            PREVIOUS_UPDATED=1
          fi

          # 切流前失败的统一回退：stop idle 色 + 还原全部 symlink + 删除失败 release。
          # nginx/active-color 全程未动，老色一直在服务，用户零影响。
          rollback_idle_and_exit() {
            log "deploy FAILED before traffic switch; old color $ACTIVE untouched and still serving"
            journalctl -u "${SERVICE_NAME}@${IDLE}" -n 120 --no-pager || true
            log "stop idle unit ${SERVICE_NAME}@${IDLE}"
            systemctl stop "${SERVICE_NAME}@${IDLE}" || true
            if [ -n "$PREV_CURRENT" ]; then
              ln -sfn "$PREV_CURRENT" "$APP_LINK"
            fi
            if [ "$PREVIOUS_UPDATED" -eq 1 ]; then
              if [ -n "$PREV_PREVIOUS" ]; then
                ln -sfn "$PREV_PREVIOUS" "$PREV_LINK"
              else
                rm -f "$PREV_LINK"
              fi
            fi
            if [ -n "$PREV_IDLE_TARGET" ]; then
              ln -sfn "$PREV_IDLE_TARGET" "$COLOR_DIR/$IDLE"
            else
              rm -f "$COLOR_DIR/$IDLE"
            fi
            log "symlinks restored: current=${PREV_CURRENT:-<unchanged>} color/$IDLE=${PREV_IDLE_TARGET:-<none>}"
            case "$RELEASE_DIR" in
              "$RELEASES_DIR"/*)
                log "remove failed release: $RELEASE_DIR"
                rm -rf -- "$RELEASE_DIR" || log "WARN: failed release cleanup failed"
                ;;
            esac
            rm -f -- "$RELEASE_TGZ" || log "WARN: failed upload cleanup failed"
            exit 1
          }

          # ── 6. 启动 idle 色 + ready 门禁（180s）──
          # enable --now：切流成功后本色即 active 色，必须开机自启；
          # 两色都 enabled 也无害（重启双起时 nginx 只路由 active、cron 由 leadership 单跑）
          log "start idle unit: ${SERVICE_NAME}@${IDLE} (port $IDLE_PORT)"
          systemctl enable --now "${SERVICE_NAME}@${IDLE}"

          ready_ok() {
            curl -fsS -m 5 "$READY_URL" >/dev/null 2>&1
          }

          READY_WAITED=0
          READY_OK=0
          log "waiting ready: $READY_URL timeout=180s"
          for _ in $(seq 1 180); do
            if ready_ok; then
              READY_OK=1
              log "ready ok after ${READY_WAITED}s"
              break
            fi
            if [ $((READY_WAITED % 10)) -eq 0 ]; then
              log "waiting ready waited=${READY_WAITED}s"
            fi
            sleep 1
            READY_WAITED=$((READY_WAITED + 1))
          done
          if [ "$READY_OK" -ne 1 ]; then
            log "ready FAILED after 180s"
            rollback_idle_and_exit
          fi

          # ── 7. warmup 等待（软门禁：failed/超时降级为警告，dispatch 时增量同步兜底）──
          read_warmup_state() {
            local body
            body=$(curl -sS -m 5 "$READY_URL" 2>/dev/null || true)
            if [ -z "$body" ]; then
              return 1
            fi
            node -e '
              const body = process.argv[1];
              let data;
              try {
                data = JSON.parse(body);
              } catch {
                process.exit(2);
              }
              console.log(String(data.warmup?.state ?? "unknown"));
            ' "$body"
          }

          log "waiting warmup.state=done timeout=420s"
          WARMUP_WAITED=0
          while [ "$WARMUP_WAITED" -lt 420 ]; do
            WARMUP_STATE=$(read_warmup_state || true)
            if [ "$WARMUP_STATE" = "done" ]; then
              log "warmup done after ${WARMUP_WAITED}s"
              break
            fi
            if [ "$WARMUP_STATE" = "failed" ]; then
              log "WARN: warmup failed; continue anyway (dispatch-time incremental sync covers)"
              break
            fi
            if [ $((WARMUP_WAITED % 30)) -eq 0 ]; then
              log "warmup state=${WARMUP_STATE:-unknown} waited=${WARMUP_WAITED}s"
            fi
            sleep 5
            WARMUP_WAITED=$((WARMUP_WAITED + 5))
          done
          if [ "$WARMUP_WAITED" -ge 420 ]; then
            log "WARN: warmup wait timeout after 420s; continue anyway (dispatch-time incremental sync covers)"
          fi

          # ── 8. 冒烟：idle 端口 healthz 200 且 drain 状态返回合法 JSON ──
          read_drain_status() {
            local body
            body=$(curl -sS -m 5 "$DRAINZ_URL" 2>/dev/null || true)
            if [ -z "$body" ]; then
              return 1
            fi
            node -e '
              const body = process.argv[1];
              let data;
              try {
                data = JSON.parse(body);
              } catch {
                process.exit(2);
              }
              const activeStreams = Number(data.activeStreams ?? 0);
              const blockingRuns = Number(data.activeRuns?.blocking ?? 0);
              const totalRuns = Number(data.activeRuns?.total ?? 0);
              const idle = data.idle === true;
              console.log(`${idle ? "idle" : "busy"} ${activeStreams} ${blockingRuns} ${totalRuns} ${data.status ?? "unknown"}`);
            ' "$body"
          }

          log "smoke check on idle port $IDLE_PORT"
          if ! curl -fsS -m 5 "$HEALTHZ_URL" >/dev/null 2>&1; then
            log "smoke FAILED: $HEALTHZ_URL not 200"
            rollback_idle_and_exit
          fi
          SMOKE_DRAIN_STATUS=$(read_drain_status || true)
          if [ -z "$SMOKE_DRAIN_STATUS" ]; then
            log "smoke FAILED: $DRAINZ_URL did not return valid JSON"
            rollback_idle_and_exit
          fi
          log "smoke ok: healthz 200, drain status: $SMOKE_DRAIN_STATUS"

          # ── 9. 切流：重写 nginx upstream（新色 primary、旧色 backup）→ nginx -t → reload ──
          UPSTREAM_BAK="/tmp/agent-saas-upstream.conf.bak.$$"
          if [ -f "$UPSTREAM_CONF" ]; then
            cp "$UPSTREAM_CONF" "$UPSTREAM_BAK"
          fi
          log "rewrite nginx upstream: primary=127.0.0.1:$IDLE_PORT ($IDLE) backup=127.0.0.1:$ACTIVE_PORT ($ACTIVE)"
          cat > "$UPSTREAM_CONF" <<EOF
          # active=$IDLE
          # 由 ci.yml 部署脚本重写，手工修改会在下次部署被覆盖
          upstream agent_saas_backend {
              server 127.0.0.1:$IDLE_PORT;
              server 127.0.0.1:$ACTIVE_PORT backup;
          }
          EOF
          if ! nginx -t; then
            log "nginx -t FAILED; restoring previous upstream conf (running nginx config unchanged)"
            if [ -f "$UPSTREAM_BAK" ]; then
              cp "$UPSTREAM_BAK" "$UPSTREAM_CONF"
            else
              rm -f "$UPSTREAM_CONF"
            fi
            nginx -t || log "WARN: nginx -t still failing after restore; manual attention needed"
            rollback_idle_and_exit
          fi
          systemctl reload nginx
          log "nginx reloaded; verifying via https://127.0.0.1 (Host: api.agent.kaiyan.net)"
          SWITCH_VERIFIED=0
          for _ in $(seq 1 10); do
            if curl -kfsS -m 5 -H 'Host: api.agent.kaiyan.net' https://127.0.0.1/api/healthz >/dev/null 2>&1; then
              SWITCH_VERIFIED=1
              break
            fi
            sleep 1
          done
          if [ "$SWITCH_VERIFIED" -ne 1 ]; then
            log "post-reload verification FAILED; flipping nginx back to $ACTIVE and rolling back"
            if [ -f "$UPSTREAM_BAK" ]; then
              cp "$UPSTREAM_BAK" "$UPSTREAM_CONF"
              { nginx -t && systemctl reload nginx; } || log "WARN: failed to flip nginx back; manual attention needed"
            fi
            rollback_idle_and_exit
          fi
          TRAFFIC_SWITCHED=1
          log "traffic switched to $IDLE"

          # ── 10. 更新活动色标记 ──
          echo "$IDLE" > "$ACTIVE_COLOR_FILE"
          log "active color updated: $ACTIVE -> $IDLE"

          # ── 11. 生成蓝绿 rollback.sh（幂等覆盖）：ssh 上来执行 bash /opt/agent-saas-app/rollback.sh ──
          # 快路径：上一色还在 drain 未退（进程仍跑旧代码）→ 直接把 nginx 翻回去；
          # 慢路径：上一色已退出 → color symlink 指向 previous release、start、等 ready、翻 nginx。
          cat > "$DEPLOY_ROOT/rollback.sh" <<'ROLLBACK'
          #!/usr/bin/env bash
          # 蓝绿一键回滚。由 ci.yml 部署时生成，手工修改会在下次部署被覆盖。
          # -E: 函数内失败也触发 ERR trap，保证任何失败都有日志且退出 1
          set -Eeuo pipefail
          ROOT="/opt/agent-saas-app"
          SERVICE="agent-saas-server"
          ACTIVE_COLOR_FILE="/etc/agent-saas/active-color"
          UPSTREAM_CONF="/etc/nginx/conf.d/agent-saas-upstream.conf"

          log() { printf '[rollback %s] %s\n' "$(date -Is)" "$*"; }
          trap 'log "rollback FAILED at line $LINENO"; exit 1' ERR

          CUR=$(tr -d '[:space:]' < "$ACTIVE_COLOR_FILE")
          case "$CUR" in
            blue)  OTHER="green"; OTHER_PORT=3201; CUR_PORT=3200 ;;
            green) OTHER="blue";  OTHER_PORT=3200; CUR_PORT=3201 ;;
            *) log "invalid active color: '$CUR'"; exit 1 ;;
          esac
          log "rollback: active=$CUR -> target=$OTHER"

          switch_traffic_back() {
            cat > "$UPSTREAM_CONF" <<EOF
          # active=$OTHER
          # 由 ci.yml 部署脚本重写，手工修改会在下次部署被覆盖
          upstream agent_saas_backend {
              server 127.0.0.1:$OTHER_PORT;
              server 127.0.0.1:$CUR_PORT backup;
          }
          EOF
            nginx -t
            systemctl reload nginx
            echo "$OTHER" > "$ACTIVE_COLOR_FILE"
            log "traffic switched back: active=$OTHER"
          }

          if systemctl is-active --quiet "$SERVICE@$OTHER"; then
            log "$SERVICE@$OTHER still running (draining or never exited); fast path: flip nginx only"
            switch_traffic_back
            log "rollback ok (fast path)"
            exit 0
          fi

          PREV=$(readlink "$ROOT/previous" 2>/dev/null || true)
          if [ -z "$PREV" ] || [ ! -d "$PREV" ]; then
            log "previous release missing: '${PREV:-<none>}'"
            exit 1
          fi
          log "slow path: color/$OTHER -> $PREV, start $SERVICE@$OTHER"
          ln -sfn "$PREV" "$ROOT/color/$OTHER"
          systemctl start "$SERVICE@$OTHER"
          for _ in $(seq 1 180); do
            if curl -fsS -m 5 "http://127.0.0.1:$OTHER_PORT/api/healthz/ready" >/dev/null 2>&1; then
              switch_traffic_back
              log "rollback ok"
              exit 0
            fi
            sleep 1
          done
          log "rollback FAILED: $SERVICE@$OTHER not ready after 180s"
          exit 1
          ROLLBACK
          chmod +x "$DEPLOY_ROOT/rollback.sh"
          log "rollback.sh regenerated (blue-green semantics)"

          # ── 12. drain 旧色：SIGUSR2 精确送 node 主进程（拒新流量→停 cron→活跃流清空→自行 exit 0）──
          # 绝不能用 systemctl kill：默认 cgroup 广播，SIGUSR2 会终止无 handler 的 SDK 子进程。
          OLD_PIDFILE="/run/${SERVICE_NAME}-${ACTIVE}.pid"
          if [ -f "$OLD_PIDFILE" ] && kill -USR2 "$(cat "$OLD_PIDFILE")" 2>/dev/null; then
            log "drain signal SIGUSR2 sent to old color $ACTIVE (pid $(cat "$OLD_PIDFILE" 2>/dev/null || echo '?'))"
          else
            log "WARN: pidfile $OLD_PIDFILE missing or kill failed; fallback to systemctl stop (SIGTERM graceful shutdown, active streams may be interrupted)"
            systemctl stop "${SERVICE_NAME}@${ACTIVE}" || true
          fi
          OLD_WAITED=0
          OLD_DRAINED=0
          while [ "$OLD_WAITED" -lt 60 ]; do
            if ! systemctl is-active --quiet "${SERVICE_NAME}@${ACTIVE}"; then
              OLD_DRAINED=1
              break
            fi
            sleep 5
            OLD_WAITED=$((OLD_WAITED + 5))
          done
          if [ "$OLD_DRAINED" -eq 1 ]; then
            log "old color drained: $ACTIVE unit inactive after ${OLD_WAITED}s"
          else
            log "old color draining in background: $ACTIVE still active after 60s (not a failure; next deploy waits up to 600s)"
          fi

          # ── 13. 收尾：pnpm store 清理 + 删除上传包 ──
          if command -v pnpm >/dev/null 2>&1; then
            log "pnpm store prune"
            pnpm store prune || log "WARN: pnpm store prune failed (non-fatal)"
          fi
          log "remove uploaded release archive"
          rm -f "$RELEASE_TGZ" "$UPSTREAM_BAK"
          log "deploy ok: $RELEASE_ID active=$IDLE (old color $ACTIVE drain issued)"
          exit 0
          REMOTE

      - name: Assert zero downtime
        # deploy 失败时也要跑（打印探测报告），probe 未启动时在脚本内跳过
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          if [ ! -f "$RUNNER_TEMP/probe.pid" ]; then
            echo "probe.pid not found (probe step did not run); skipping"
            exit 0
          fi
          kill "$(cat "$RUNNER_TEMP/probe.pid")" 2>/dev/null || true
          if [ ! -f "$RUNNER_TEMP/probe.log" ]; then
            echo "probe.log missing; nothing to assert"
            exit 0
          fi
          TOTAL=$(wc -l < "$RUNNER_TEMP/probe.log" | tr -d '[:space:]')
          NON200=$(awk '$2 != "200" { n++ } END { print n + 0 }' "$RUNNER_TEMP/probe.log")
          MAX_STREAK=$(awk '$2 != "200" { s++; if (s > m) m = s; next } { s = 0 } END { print m + 0 }' "$RUNNER_TEMP/probe.log")
          echo "probe summary: total=$TOTAL non200=$NON200 max_consecutive_non200=$MAX_STREAK"
          if [ "${NON200:-0}" -gt 0 ]; then
            echo "--- non-200 probe lines (epoch http_code) ---"
            awk '$2 != "200"' "$RUNNER_TEMP/probe.log"
          fi
          # deploy 失败时旧色未动，探测应全绿；此处只报告不守门，不改变 job 结论
          if [ "$DEPLOY_OUTCOME" != "success" ]; then
            echo "deploy outcome=$DEPLOY_OUTCOME; report only, zero-downtime gate skipped"
            exit 0
          fi
          # 容忍单次公网抖动：连续非 200 达到 2 次才判停机
          if [ "${MAX_STREAK:-0}" -ge 2 ]; then
            echo "ZERO-DOWNTIME GATE FAILED: max consecutive non-200 = $MAX_STREAK (must be < 2)"
            exit 1
          fi
          echo "zero-downtime gate passed"

  # 前端静态托管在 OSS（bucket agent-saas-web，绑定 agent.kaiyan.net），
  # API/WS 走独立域名 api.agent.kaiyan.net（VITE_API_BASE 构建时注入）。
  # 与 ECS 部署同为 dispatch-only，保证前后端版本一致发布。
  # 上传顺序：先 hash 资源（immutable，只增不删，兼容在途会话的旧 chunk 懒加载）,
  # 后入口文件（no-cache），保证 index.html 引用的资源先就位。
  deploy-web-oss:
    name: Deploy Web to OSS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'

    env:
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_WEB_DEPLOY_AK_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_WEB_DEPLOY_AK_SECRET }}
      OSS_REGION: cn-shenzhen
      OSS_BUCKET: agent-saas-web
      VITE_API_BASE: https://api.agent.kaiyan.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (split-domain)
        run: pnpm -F web build

      - name: Install ossutil
        run: |
          curl -sL https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip -o /tmp/ossutil.zip
          unzip -o -q /tmp/ossutil.zip -d /tmp
          sudo install /tmp/ossutil-2.1.2-linux-amd64/ossutil /usr/local/bin/ossutil
          ossutil version

      - name: Upload to OSS
        run: |
          : "${OSS_ACCESS_KEY_ID:?Missing secret OSS_WEB_DEPLOY_AK_ID}"
          : "${OSS_ACCESS_KEY_SECRET:?Missing secret OSS_WEB_DEPLOY_AK_SECRET}"
          cd web/dist
          # 1) hash 静态资源：不可变长缓存（只增量新增，不删除旧 hash 文件）
          ossutil cp assets "oss://$OSS_BUCKET/assets" -r -f --region "$OSS_REGION" \
            --cache-control "public, max-age=31536000, immutable"
          # 2) 图标与预置资源：短缓存
          for d in icons kaikai-presets; do
            [ -d "$d" ] && ossutil cp "$d" "oss://$OSS_BUCKET/$d" -r -f --region "$OSS_REGION" \
              --cache-control "public, max-age=86400"
          done
          for f in apple-touch-icon.png favicon-16x16.png favicon-32x32.png favicon.ico kaikai-avatar.png; do
            [ -f "$f" ] && ossutil cp "$f" "oss://$OSS_BUCKET/$f" -f --region "$OSS_REGION" \
              --cache-control "public, max-age=86400"
          done
          # 3) 入口文件最后覆盖：no-cache（SW 更新机制依赖 sw.js/index.html 即时生效）
          for f in sw.js workbox-*.js manifest.webmanifest index.html; do
            ossutil cp "$f" "oss://$OSS_BUCKET/$f" -f --region "$OSS_REGION" \
              --cache-control "no-cache"
          done
          echo "web dist uploaded to oss://$OSS_BUCKET"
