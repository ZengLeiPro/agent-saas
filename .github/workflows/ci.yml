# ============================================================================
# CI/CD Pipeline: install → typecheck → test → build → deploy ECS
# ============================================================================
# 触发:
#   - push to main: 只构建 + 测试 + 打包 artifact（不部署生产）
#   - workflow_dispatch: 构建通过后部署生产（Actions 页面手动触发，
#     或 `gh workflow run ci.yml`）
# 部署与发布解耦: 多 agent 共享仓库高频 push，push ≠ 上生产；
# 想发版时手动触发一次 dispatch。
# 部署脚本: 等空闲窗口(activeStreams=0) → 切 symlink → restart →
#   healthz 门禁失败自动回滚 previous。
# ============================================================================

name: App CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck server
        run: pnpm -F server typecheck

      - name: Run tests
        run: pnpm test

      - name: Scenarios sanitize check
        run: pnpm sanitize-check

      # web build 内含 tsc，同时完成 typecheck + vite build
      - name: Build frontend
        run: pnpm -F web build

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    # 生产部署只走手动触发（workflow_dispatch），push main 不再自动上生产
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'

    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      DEPLOY_ROOT: /opt/agent-saas-app
      SERVICE_NAME: agent-saas-server

    steps:
      # 部署产物不走 GitHub artifact（存储配额有限且用量重算延迟 6-12h，
      # 2026-07-03 曾因配额爆掉全线 CI 红）；deploy job 自构建后直接 scp。
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -F web build

      - name: Pack ECS release
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./*/node_modules' \
            --exclude='./server/data' \
            --exclude='./logs' \
            --exclude='./config.json' \
            --exclude='./config.json.*' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./mobile/ios' \
            --exclude='./mobile/android' \
            -czf "$RUNNER_TEMP/agent-saas-release.tgz" .
          mv "$RUNNER_TEMP/agent-saas-release.tgz" agent-saas-release.tgz

      - name: Configure SSH
        run: |
          : "${ECS_HOST:?Missing secret ECS_HOST}"
          : "${ECS_USER:?Missing secret ECS_USER}"
          : "${ECS_SSH_KEY:?Missing secret ECS_SSH_KEY}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp -i ~/.ssh/ecs_deploy_key \
            -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            agent-saas-release.tgz \
            "$ECS_USER@$ECS_HOST:/tmp/agent-saas-${GITHUB_SHA}.tgz"

      - name: Deploy and restart
        timeout-minutes: 16
        run: |
          REMOTE_DEPLOY_TIMEOUT_SECONDS=900
          echo "Remote deploy timeout: ${REMOTE_DEPLOY_TIMEOUT_SECONDS}s"
          timeout "${REMOTE_DEPLOY_TIMEOUT_SECONDS}s" ssh -i ~/.ssh/ecs_deploy_key \
            -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "$ECS_USER@$ECS_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' SERVICE_NAME='$SERVICE_NAME' RELEASE_TGZ='/tmp/agent-saas-${GITHUB_SHA}.tgz' RELEASE_ID='${GITHUB_SHA}' bash -s" <<'REMOTE'
          set -euo pipefail

          : "${DEPLOY_ROOT:?missing DEPLOY_ROOT}"
          : "${SERVICE_NAME:?missing SERVICE_NAME}"
          : "${RELEASE_TGZ:?missing RELEASE_TGZ}"
          : "${RELEASE_ID:?missing RELEASE_ID}"

          APP_LINK="$DEPLOY_ROOT/current"
          PREV_LINK="$DEPLOY_ROOT/previous"
          RELEASES_DIR="$DEPLOY_ROOT/releases"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          DATA_DIR="/mnt/agent-saas/server-data"
          HEALTHZ_URL="http://127.0.0.1:3200/api/healthz"
          DRAINZ_URL="http://127.0.0.1:3200/api/healthz/drain"

          START_EPOCH=$(date +%s)
          elapsed_seconds() {
            echo $(( $(date +%s) - START_EPOCH ))
          }
          log() {
            printf '[remote %s +%ss] %s\n' "$(date -Is)" "$(elapsed_seconds)" "$*"
          }
          on_error() {
            local status=$?
            log "ERROR status=$status line=$1 release=$RELEASE_ID"
            exit "$status"
          }
          trap 'on_error $LINENO' ERR

          log "deploy start release=$RELEASE_ID root=$DEPLOY_ROOT service=$SERVICE_NAME"
          log "prepare release dir: $RELEASE_DIR"
          mkdir -p "$RELEASES_DIR" "$DATA_DIR"
          if [ -e "$RELEASE_DIR" ]; then
            log "existing release dir found; moving aside"
            mv "$RELEASE_DIR" "$RELEASE_DIR.replaced.$(date +%Y%m%d%H%M%S)"
          fi
          mkdir -p "$RELEASE_DIR"
          log "extract release archive: $RELEASE_TGZ"
          tar -xzf "$RELEASE_TGZ" -C "$RELEASE_DIR"
          ln -sfn "$DATA_DIR" "$RELEASE_DIR/server/data"

          cd "$RELEASE_DIR"
          log "prepare pnpm"
          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@10.18.3 --activate
          fi
          log "remote pnpm install start"
          NODE_ENV=development pnpm install --frozen-lockfile --filter server... --filter shared...
          log "remote pnpm install done"

          prune_pnpm_store() {
            if command -v pnpm >/dev/null 2>&1; then
              log "pnpm store prune start"
              pnpm store prune || echo "pnpm store prune failed; continuing" >&2
              log "pnpm store prune done"
            fi
          }

          healthz_ok() {
            curl -fsS -m 5 "$HEALTHZ_URL" >/dev/null 2>&1
          }

          read_drain_status() {
            local body
            body=$(curl -sS -m 5 "$DRAINZ_URL" 2>/dev/null || true)
            if [ -z "$body" ]; then
              return 1
            fi
            node -e '
              const body = process.argv[1];
              let data;
              try {
                data = JSON.parse(body);
              } catch {
                process.exit(2);
              }
              const activeStreams = Number(data.activeStreams ?? 0);
              const blockingRuns = Number(data.activeRuns?.blocking ?? 0);
              const totalRuns = Number(data.activeRuns?.total ?? 0);
              const idle = data.idle === true;
              console.log(`${idle ? "idle" : "busy"} ${activeStreams} ${blockingRuns} ${totalRuns} ${data.status ?? "unknown"}`);
            ' "$body"
          }

          # ── 等待空闲窗口：Web stream + durable active run 清零后再切换（等待期间旧版本照常服务）──
          # 首次发布该修复时，旧生产没有 /healthz/drain，走 bootstrap fallback；之后发布严格按 JSON 守门。
          log "waiting for idle window: activeStreams=0 activeRuns.blocking=0 timeout=360s"
          IDLE_WAITED=0
          while [ "$IDLE_WAITED" -lt 360 ]; do
            DRAIN_STATUS=$(read_drain_status || true)
            if [ -z "$DRAIN_STATUS" ]; then
              log "drain status endpoint unavailable; bootstrap fallback to healthz"
              healthz_ok || true
              break
            fi
            set -- $DRAIN_STATUS
            IDLE_STATE="$1"
            ACTIVE_STREAMS="$2"
            BLOCKING_RUNS="$3"
            TOTAL_ACTIVE_RUNS="$4"
            DRAIN_STATUS_TEXT="$5"
            if [ "$IDLE_STATE" = "idle" ]; then
              log "idle window acquired after ${IDLE_WAITED}s status=$DRAIN_STATUS_TEXT activeStreams=$ACTIVE_STREAMS activeRuns.blocking=$BLOCKING_RUNS activeRuns.total=$TOTAL_ACTIVE_RUNS"
              break
            fi
            if [ $((IDLE_WAITED % 30)) -eq 0 ]; then
              log "still busy: status=$DRAIN_STATUS_TEXT activeStreams=$ACTIVE_STREAMS activeRuns.blocking=$BLOCKING_RUNS activeRuns.total=$TOTAL_ACTIVE_RUNS waited=${IDLE_WAITED}s"
            fi
            sleep 5
            IDLE_WAITED=$((IDLE_WAITED + 5))
          done
          if [ "$IDLE_WAITED" -ge 360 ]; then
            log "idle window timeout after 360s; proceeding anyway (active run may be interrupted)"
          fi

          # ── 记录回滚目标 & 切换 ──
          PREV_TARGET=""
          if [ -L "$APP_LINK" ]; then
            PREV_TARGET=$(readlink "$APP_LINK")
          elif [ -d "$APP_LINK" ]; then
            log "legacy current dir found; moving aside"
            mv "$APP_LINK" "$DEPLOY_ROOT/legacy-current-$(date +%Y%m%d%H%M%S)"
          fi
          log "switch current: prev=${PREV_TARGET:-<none>} next=$RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$APP_LINK"
          if [ -n "$PREV_TARGET" ] && [ "$PREV_TARGET" != "$RELEASE_DIR" ]; then
            ln -sfn "$PREV_TARGET" "$PREV_LINK"
          fi

          # 手动回滚入口（幂等覆盖）：ssh 上来执行 bash /opt/agent-saas-app/rollback.sh
          cat > "$DEPLOY_ROOT/rollback.sh" <<'ROLLBACK'
          #!/usr/bin/env bash
          # 一键回滚：current ↔ previous 互换后重启。由 ci.yml 部署时生成。
          set -euo pipefail
          ROOT="/opt/agent-saas-app"
          CUR=$(readlink "$ROOT/current"); PREV=$(readlink "$ROOT/previous")
          [ -d "$PREV" ] || { echo "previous release missing: $PREV"; exit 1; }
          echo "rollback: $CUR -> $PREV"
          ln -sfn "$PREV" "$ROOT/current"; ln -sfn "$CUR" "$ROOT/previous"
          systemctl restart agent-saas-server
          # 启动含全量 skills sync（随用户数增长，2026-07-07 实测 16 用户约 165s），窗口须给足
          for _ in $(seq 1 420); do
            if curl -fsS -m 5 http://127.0.0.1:3200/api/healthz >/dev/null 2>&1; then
              echo "rollback ok"; exit 0
            fi
            sleep 1
          done
          echo "rollback healthz FAILED"; exit 1
          ROLLBACK
          chmod +x "$DEPLOY_ROOT/rollback.sh"

          log "restart service: $SERVICE_NAME"
          systemctl restart "$SERVICE_NAME"

          # ── healthz 门禁：420s 内不过 → 自动回滚到上一 release ──
          # 窗口依据：启动含全量 skills sync（每用户约 8s，随用户数增长），
          # 2026-07-07 kaiyan 建 12 账号后实测启动 165s，120s 窗口误判失败+误判回滚失败。
          HEALTH_WAITED=0
          for _ in $(seq 1 420); do
            if healthz_ok; then
              log "healthz ok after ${HEALTH_WAITED}s"
              prune_pnpm_store
              log "remove uploaded release archive"
              rm -f "$RELEASE_TGZ"
              # 自动清理：保留最近 5 个 release + current/previous 指向
              # （盘只有 40G，每个 release 约 1.5G，不清会涨满打挂服务）
              log "release cleanup start: keep last 5 releases plus current/previous"
              KEEP_CURRENT=$(readlink "$APP_LINK" 2>/dev/null || true)
              KEEP_PREV=$(readlink "$PREV_LINK" 2>/dev/null || true)
              (ls -dt "$RELEASES_DIR"/*/ 2>/dev/null || true) | tail -n +6 | while read -r old; do
                old="${old%/}"
                if [ -n "$old" ] && [ "$old" != "$KEEP_CURRENT" ] && [ "$old" != "$KEEP_PREV" ]; then
                  log "pruning old release: $old"
                  rm -rf "$old"
                fi
              done
              log "release cleanup done"
              log "deploy ok: $RELEASE_ID"
              exit 0
            fi
            if [ $((HEALTH_WAITED % 10)) -eq 0 ]; then
              log "waiting healthz waited=${HEALTH_WAITED}s"
            fi
            sleep 1
            HEALTH_WAITED=$((HEALTH_WAITED + 1))
          done

          log "healthz failed after 420s; rolling back to ${PREV_TARGET:-<none>}"
          journalctl -u "$SERVICE_NAME" -n 120 --no-pager || true
          if [ -n "$PREV_TARGET" ] && [ -d "$PREV_TARGET" ]; then
            log "rollback switch current=$PREV_TARGET previous=$RELEASE_DIR"
            ln -sfn "$PREV_TARGET" "$APP_LINK"
            ln -sfn "$RELEASE_DIR" "$PREV_LINK"
            log "restart service for rollback"
            systemctl restart "$SERVICE_NAME"
            ROLLBACK_WAITED=0
            for _ in $(seq 1 420); do
              if healthz_ok; then
                log "rollback ok after ${ROLLBACK_WAITED}s; production restored on previous release ($PREV_TARGET)"
                exit 1
              fi
              if [ $((ROLLBACK_WAITED % 10)) -eq 0 ]; then
                log "waiting rollback healthz waited=${ROLLBACK_WAITED}s"
              fi
              sleep 1
              ROLLBACK_WAITED=$((ROLLBACK_WAITED + 1))
            done
            log "rollback also failed; manual intervention required"
          fi
          exit 1
          REMOTE
