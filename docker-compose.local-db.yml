# Local-only PostgreSQL for MacBook development/production smoke runs.
# Usage: docker compose -f docker-compose.local-db.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-saas-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_PG_DATABASE:-agent_runtime}
      POSTGRES_USER: ${LOCAL_PG_USER:-agent_runtime_app}
      POSTGRES_PASSWORD: ${LOCAL_PG_PASSWORD:-agent_runtime_dev_password}
    ports:
      - "127.0.0.1:${LOCAL_PG_PORT:-5432}:5432"
    volumes:
      - agent-saas-local-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  agent-saas-local-pg-data:
    driver: local
