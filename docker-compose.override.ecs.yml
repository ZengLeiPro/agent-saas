# ============================================================
# ECS 专用 override：把 docker named volume 换成阿里云 NAS bind mount（β-Q2）。
#
# 用法：
#   docker compose --env-file .env.ecs \
#     -f docker-compose.yml -f docker-compose.override.ecs.yml up -d
#
# 前提：/mnt/nas/agent-runtime 已挂载阿里云 NAS（见 docs/ecs-deployment.md §1.2），
#       且其下 workspace/transcripts/server-data/server-logs 子目录可写。
#
# 合并语义：docker compose 按「容器内目标路径」合并 service.volumes，
#   本文件声明的同 target 会覆盖 docker-compose.yml 里的 named volume。
#   ⚠️ 这里显式重列了全部 5 个挂载（含 config.json），不依赖"漏声明即保留"的
#      隐式行为——确保无论 compose 版本如何，server 都能读到 config.json 且
#      数据目录都落在 NAS（ECS 重建/扩容不丢）。
# ============================================================
services:
  server:
    volumes:
      # config.json：唯一权威配置源，只读挂载（宿主路径来自 .env.ecs 的 CONFIG_JSON_PATH）
      - ${CONFIG_JSON_PATH:-/etc/agent-runtime/config.json}:/app/config.json:ro
      # workspace：server 与 hand-server 共享同一份 NAS 目录（β-Q1+β-Q2 → 文件预览无需改 transport）
      - /mnt/nas/agent-runtime/workspace:/app/workspace
      # transcripts：会话归档
      - /mnt/nas/agent-runtime/transcripts:/root/.agent-saas/legacy-transcripts
      # server data：sessions metadata / 本地 sqlite（PG backend 下 audit 走 RDS，不依赖这里的 duckdb）
      - /mnt/nas/agent-runtime/server-data:/app/server/data
      # logs
      - /mnt/nas/agent-runtime/server-logs:/app/logs

  hand-server:
    volumes:
      # 与 server 看同一份 workspace（β-Q1 同台 ECS 不同容器，共享 NAS）
      - /mnt/nas/agent-runtime/workspace:/app/sandbox
